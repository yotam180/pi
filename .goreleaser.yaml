version: 2

project_name: pi

builds:
  - id: pi
    main: ./cmd/pi
    binary: pi
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/vyper-tooling/pi/internal/cli.version={{ .Version }}

archives:
  - id: pi
    ids: [pi]
    formats: [tar.gz]
    name_template: "pi_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

homebrew_casks:
  - name: pi
    binaries:
      - pi
    directory: Casks
    homepage: "https://github.com/yotam180/pi"
    description: "Developer automation platform — structured, polyglot, shareable automations"
    commit_msg_template: "Update pi to {{ .Tag }}"
    skip_upload: auto
    repository:
      owner: yotam180
      name: homebrew-pi
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/pi"]
          end

release:
  github:
    owner: yotam180
    name: pi
  name_template: "v{{ .Version }}"
  draft: false
  prerelease: auto
