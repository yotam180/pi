name: docker/logs
description: Show recent container logs

inputs:
  service:
    type: string
    default: all
    description: Docker Compose service to tail
  tail:
    type: string
    default: "200"
    description: Number of log lines

steps:
  - bash: |
      echo "Showing logs for: $PI_IN_SERVICE (last $PI_IN_TAIL lines)"
      echo "[api]      2024-01-15 10:00:01 Server started on :8080"
      echo "[api]      2024-01-15 10:00:02 Connected to database"
      echo "[postgres] 2024-01-15 10:00:00 Database ready"
      echo "[redis]    2024-01-15 10:00:00 Ready to accept connections"
