description: Install Python at a specific version

inputs:
  version:
    type: string
    description: Python version to install (e.g. "3.13")

install:
  test:
    - bash: python3 --version 2>&1 | grep -q "Python $PI_IN_VERSION"

  run:
    - first:
        - bash: mise install "python@$PI_IN_VERSION" && mise use "python@$PI_IN_VERSION"
          if: command.mise
        - bash: brew install "python@$PI_IN_VERSION"
          if: command.brew
        - bash: |
            echo "no suitable installer found for Python (tried mise, brew)" >&2
            echo "Install one of:" >&2
            echo "  mise  → https://mise.jdx.dev" >&2
            echo "  brew  → https://brew.sh" >&2
            exit 1

  verify:
    - bash: python3 --version 2>&1 | grep -q "Python $PI_IN_VERSION"

  version: python3 --version 2>&1 | awk '{print $2}'
