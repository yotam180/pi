description: Install Python at a specific version

inputs:
  version:
    type: string
    description: Python version to install (e.g. "3.13", ">=3.11", "^3.12")

install:
  test:
    - bash: |
        # Try pyenv first — it manages its own PATH and shims
        if command -v pyenv >/dev/null 2>&1; then
          v=$(pyenv version-name 2>/dev/null)
          if [ -n "$v" ] && [ "$v" != "system" ]; then
            echo "$v"
            exit 0
          fi
        fi
        # Try python3, then python (some setups alias python to Python 3)
        for cmd in python3 python; do
          v=$($cmd --version 2>/dev/null | awk '{print $2}')
          if [ -n "$v" ]; then
            echo "$v"
            exit 0
          fi
        done
        exit 1
    - run: pi:version-satisfies
      with:
        version: outputs.last
        required: inputs.version

  run:
    - first:
        - bash: |
            pyenv install "$PI_IN_VERSION" 2>/dev/null || true
            # Find the installed version that matches (e.g. 3.13 → 3.13.11)
            installed=$(pyenv versions --bare 2>/dev/null | grep "^${PI_IN_VERSION}" | tail -1)
            if [ -z "$installed" ]; then
              echo "pyenv could not install Python $PI_IN_VERSION" >&2
              exit 1
            fi
            pyenv global "$installed"
          if: command.pyenv
        - bash: mise install "python@$PI_IN_VERSION" && mise use "python@$PI_IN_VERSION"
          if: command.mise
        - bash: brew install "python@$PI_IN_VERSION"
          if: command.brew
        - bash: |
            echo "no suitable installer found for Python (tried pyenv, mise, brew)" >&2
            echo "Install one of:" >&2
            echo "  pyenv → https://github.com/pyenv/pyenv" >&2
            echo "  mise  → https://mise.jdx.dev" >&2
            echo "  brew  → https://brew.sh" >&2
            exit 1

  verify:
    - bash: |
        if command -v pyenv >/dev/null 2>&1; then
          v=$(pyenv version-name 2>/dev/null)
          if [ -n "$v" ] && [ "$v" != "system" ]; then
            echo "$v"
            exit 0
          fi
        fi
        for cmd in python3 python; do
          v=$($cmd --version 2>/dev/null | awk '{print $2}')
          if [ -n "$v" ]; then
            echo "$v"
            exit 0
          fi
        done
        exit 1
    - run: pi:version-satisfies
      with:
        version: outputs.last
        required: inputs.version

  version: |
    if command -v pyenv >/dev/null 2>&1; then
      v=$(pyenv version-name 2>/dev/null)
      if [ -n "$v" ] && [ "$v" != "system" ]; then
        echo "$v"
        exit 0
      fi
    fi
    for cmd in python3 python; do
      v=$($cmd --version 2>/dev/null | awk '{print $2}')
      if [ -n "$v" ]; then
        echo "$v"
        exit 0
      fi
    done
