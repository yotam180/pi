description: Install Node.js at a specific version

inputs:
  version:
    type: string
    description: Node.js version to install (e.g. "22", ">=20", "^18")

install:
  test:
    - bash: node --version 2>/dev/null | sed 's/^v//'
    - run: pi:version-satisfies
      with:
        version: outputs.last
        required: inputs.version

  run:
    - first:
        - bash: mise install "node@$PI_IN_VERSION" && mise use "node@$PI_IN_VERSION"
          if: command.mise
        - bash: brew install "node@$PI_IN_VERSION"
          if: command.brew
        - bash: |
            echo "no suitable installer found for Node.js (tried mise, brew)" >&2
            echo "Install one of:" >&2
            echo "  mise  → https://mise.jdx.dev" >&2
            echo "  brew  → https://brew.sh" >&2
            exit 1

  version: node --version 2>&1 | sed 's/^v//'
