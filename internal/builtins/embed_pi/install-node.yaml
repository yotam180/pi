name: install-node
description: Install Node.js at a specific version

inputs:
  version:
    type: string
    description: Node.js major version to install (e.g. "22")

install:
  test:
    - bash: |
        CURRENT=$(node --version 2>/dev/null | sed 's/^v//')
        MAJOR=$(echo "$CURRENT" | cut -d. -f1)
        [ "$MAJOR" = "$PI_IN_VERSION" ]

  run:
    - bash: mise install "node@$PI_IN_VERSION" && mise use "node@$PI_IN_VERSION"
      if: command.mise
    - bash: brew install "node@$PI_IN_VERSION"
      if: command.brew and not command.mise
    - bash: |
        echo "no suitable installer found (tried mise, brew)" >&2
        exit 1
      if: not command.mise and not command.brew

  version: node --version 2>&1 | sed 's/^v//'
