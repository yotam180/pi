description: Install Terraform at a specific version

inputs:
  version:
    type: string
    description: Terraform version to install (e.g. "1.7", ">=1.6", "^1.7")

install:
  test:
    - bash: terraform version 2>&1 | head -1 | awk '{print $2}' | tr -d 'v'
    - run: pi:version-satisfies
      with:
        version: outputs.last
        required: inputs.version

  run:
    - first:
        - bash: mise install "terraform@$PI_IN_VERSION" && mise use -g "terraform@$PI_IN_VERSION"
          if: command.mise
        - bash: brew install hashicorp/tap/terraform
          if: command.brew
        - bash: |
            echo "no suitable installer found for Terraform (tried mise, brew)" >&2
            echo "Install one of:" >&2
            echo "  mise  → https://mise.jdx.dev" >&2
            echo "  brew  → https://brew.sh" >&2
            echo "Or install Terraform manually: https://developer.hashicorp.com/terraform/install" >&2
            exit 1

  version: terraform version 2>&1 | head -1 | awk '{print $2}' | tr -d 'v'
