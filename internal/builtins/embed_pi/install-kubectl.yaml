description: Install kubectl at a specific version

inputs:
  version:
    type: string
    description: kubectl version to install (e.g. "1.28", ">=1.27", "^1.28")

install:
  test:
    - bash: kubectl version --client 2>&1 | grep -o 'v[0-9]*\.[0-9]*\.[0-9]*' | head -1 | tr -d 'v'
    - run: pi:version-satisfies
      with:
        version: outputs.last
        required: inputs.version

  run:
    - first:
        - bash: mise install "kubectl@$PI_IN_VERSION" && mise use -g "kubectl@$PI_IN_VERSION"
          if: command.mise
        - bash: brew install kubectl
          if: command.brew
        - bash: |
            echo "no suitable installer found for kubectl (tried mise, brew)" >&2
            echo "Install one of:" >&2
            echo "  mise  → https://mise.jdx.dev" >&2
            echo "  brew  → https://brew.sh" >&2
            echo "Or install kubectl manually: https://kubernetes.io/docs/tasks/tools/" >&2
            exit 1

  version: kubectl version --client 2>&1 | grep -o 'v[0-9]*\.[0-9]*\.[0-9]*' | head -1 | tr -d 'v'
