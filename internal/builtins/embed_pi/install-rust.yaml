description: Install Rust at a specific version

inputs:
  version:
    type: string
    description: Rust version or channel to install (e.g. "1.88", ">=1.80", "^1.85", "stable", "nightly", "beta")

install:
  test:
    - bash: rustc --version 2>/dev/null | awk '{print $2}'
    - run: pi:version-satisfies
      with:
        version: outputs.last
        required: inputs.version

  run:
    - bash: |
        if command -v rustup >/dev/null 2>&1; then
          rustup install "$PI_IN_VERSION" && rustup default "$PI_IN_VERSION"
        else
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$PI_IN_VERSION"
          . "$HOME/.cargo/env"
        fi

  version: rustc --version 2>&1 | awk '{print $2}'
