description: Install Go at a specific version

inputs:
  version:
    type: string
    description: Go version to install (e.g. "1.23", ">=1.22", "^1.23")

install:
  test:
    - bash: go version 2>/dev/null | awk '{print $3}' | sed 's/^go//'
    - run: pi:version-satisfies
      with:
        version: outputs.last
        required: inputs.version

  run:
    - first:
        - bash: mise install "go@$PI_IN_VERSION" && mise use "go@$PI_IN_VERSION"
          if: command.mise
        - bash: brew install "go@$PI_IN_VERSION"
          if: command.brew
        - bash: |
            echo "no suitable installer found for Go (tried mise, brew)" >&2
            echo "Install one of:" >&2
            echo "  mise  → https://mise.jdx.dev" >&2
            echo "  brew  → https://brew.sh" >&2
            exit 1

  version: go version 2>&1 | awk '{print $3}' | sed 's/^go//'
