description: Install git hooks from a source directory

inputs:
  source:
    type: string
    description: Directory containing hook scripts (relative to repo root)

bash: |
  SOURCE="$PI_IN_SOURCE"
  if [ -z "$SOURCE" ]; then
    echo "Error: source input is required" >&2
    exit 1
  fi

  if [ ! -d "$SOURCE" ]; then
    echo "Error: source directory '$SOURCE' not found" >&2
    exit 1
  fi

  HOOKS_DIR=".git/hooks"
  if [ ! -d "$HOOKS_DIR" ]; then
    echo "Error: .git/hooks directory not found — is this a git repository?" >&2
    exit 1
  fi

  INSTALLED=0
  SKIPPED=0

  for hook in "$SOURCE"/*; do
    [ -f "$hook" ] || continue
    HOOK_NAME=$(basename "$hook")
    DEST="$HOOKS_DIR/$HOOK_NAME"

    if [ -f "$DEST" ] && cmp -s "$hook" "$DEST"; then
      SKIPPED=$((SKIPPED + 1))
    else
      cp "$hook" "$DEST"
      chmod +x "$DEST"
      INSTALLED=$((INSTALLED + 1))
    fi
  done

  if [ "$INSTALLED" -eq 0 ] && [ "$SKIPPED" -eq 0 ]; then
    echo "[skipped] no hook files found in '$SOURCE'"
  elif [ "$INSTALLED" -eq 0 ]; then
    echo "[already installed] all ${SKIPPED} hook(s) up to date"
  else
    echo "[installed] ${INSTALLED} hook(s), ${SKIPPED} already up to date"
  fi
